<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idleview Control Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      The font stylesheet is NOT hardcoded here. It is generated from the backend's font
      catalogue (GET /api/fonts) and injected at runtime, so the panel can never preview
      a font the screen will not render - which is exactly what these two hand-written
      links used to do. They also requested different weights than the dashboard did, so
      a preview here did not match what you got over there.
    -->
  </head>

    <script type="module" src="/src/main.js"></script>
